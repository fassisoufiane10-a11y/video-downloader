<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Downloader - Free Premium Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at top, #1e1b4b, #090514); }
        .neon-glow { box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex flex-col justify-between font-sans">
    <header class="border-b border-purple-900/40 bg-black/20 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-cloud-arrow-down text-purple-500 text-2xl animate-pulse"></i>
                <span class="text-xl font-black tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-500">PRO DOWNLOADER</span>
            </div>
        </div>
    </header>
    <main class="max-w-4xl mx-auto px-4 py-12 flex-grow w-full">
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4 text-white">Download Videos <span class="bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-500">In Seconds</span></h1>
            <p class="text-gray-400 text-sm md:text-base">Support YouTube, TikTok, Instagram, Facebook. No limits, completely free.</p>
        </div>
        <div class="bg-black/40 border border-purple-900/50 p-6 rounded-2xl neon-glow backdrop-blur-md max-w-2xl mx-auto mb-12">
            <form id="downloadForm" class="space-y-4">
                <div class="relative flex items-center">
                    <i class="fa-solid fa-link absolute left-4 text-purple-400"></i>
                    <input type="url" id="videoUrl" placeholder="Paste video link here..." required class="w-full pl-11 pr-4 py-4 bg-purple-950/20 border border-purple-900/60 rounded-xl focus:outline-none focus:border-pink-500 text-white placeholder-gray-500 transition text-sm">
                </div>
                <button type="submit" class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold rounded-xl transition flex items-center justify-center space-x-2 shadow-lg">
                    <i class="fa-solid fa-circle-down"></i><span>Fetch Video Links</span>
                </button>
            </form>
            <div id="loader" class="hidden mt-8 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-purple-500 border-t-transparent mb-2"></div>
                <p class="text-sm text-purple-300 animate-pulse">Analyzing video source, please wait...</p>
            </div>
            <div id="result" class="hidden mt-8 p-4 bg-purple-950/30 border border-purple-500/30 rounded-xl space-y-4">
                <div class="flex flex-col md:flex-row items-center space-y-4 md:space-y-0 md:space-x-4">
                    <img id="videoThumb" src="" alt="Thumbnail" class="w-full md:w-36 h-24 object-cover rounded-lg border border-purple-900/60">
                    <div class="flex-grow text-center md:text-left">
                        <h3 id="videoTitle" class="text-sm font-semibold text-white line-clamp-2 mb-1">Video Title</h3>
                        <p class="text-xs text-gray-400 mb-3">Duration: <span id="videoDuration" class="text-purple-400 font-bold">0:00</span></p>
                        <a id="downloadBtn" href="" target="_blank" rel="noopener noreferrer" class="inline-flex items-center space-x-2 px-6 py-2.5 bg-green-600 hover:bg-green-500 text-white font-bold text-xs rounded-lg transition uppercase tracking-wider">
                            <i class="fa-solid fa-download"></i><span>Download Direct MP4</span>
                        </a>
                    </div>
                </div>
            </div>
            <div id="errorMessage" class="hidden mt-6 p-3 bg-red-950/40 border border-red-800/50 text-red-400 text-xs rounded-xl text-center"></div>
        </div>
    </main>
    <footer class="text-center py-6 border-t border-purple-900/20 bg-black/40 text-xs text-gray-500">
        <p>&copy; 2026 Pro Downloader. Built for high performance.</p>
    </footer>
    <script>
        document.getElementById('downloadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const urlInput = document.getElementById('videoUrl').value;
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');
            const errorDiv = document.getElementById('errorMessage');
            loader.classList.remove('hidden'); result.classList.add('hidden'); errorDiv.classList.add('hidden');
            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });
                const data = await response.json();
                if (!response.ok || data.status === 'error') throw new Error(data.message || 'Failed to fetch video');
                document.getElementById('videoTitle').innerText = data.title;
                document.getElementById('videoDuration').innerText = data.duration;
                document.getElementById('videoThumb').src = data.thumbnail || 'https://via.placeholder.com/150';
                document.getElementById('downloadBtn').href = data.download_url;
                result.classList.remove('hidden');
            } catch (err) {
                errorDiv.innerText = err.message; errorDiv.classList.remove('hidden');
            } finally { loader.classList.add('hidden'); }
        });
    </script>
</body>
</html>
